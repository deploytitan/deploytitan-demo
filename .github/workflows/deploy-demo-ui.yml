name: Deploy — demo-ui

on:
  push:
    branches: [main]
    paths:
      - 'apps/demo-ui/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-demo-ui.yml'

env:
  REGISTRY: us-central1-docker.pkg.dev
  GCP_PROJECT: deploy-titan-staging
  GCP_REGION: us-central1
  SERVICE: demo-ui
  IMAGE: us-central1-docker.pkg.dev/deploy-titan-staging/deploytitan-staging/demo-ui

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Vite bakes VITE_* vars at build time — pass as build args
      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/demo-ui/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          build-args: |
            VITE_API_URL=${{ secrets.DEMO_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --platform managed \
            --min-instances 0 \
            --max-instances 2 \
            --cpu 1 \
            --memory 128Mi \
            --concurrency 80 \
            --quiet
