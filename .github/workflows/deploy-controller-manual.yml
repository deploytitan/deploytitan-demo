name: Deploy — controller (manual)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Controller image tag to deploy from DeployTitan Artifact Registry
        required: false
        default: latest

env:
  CONTROLLER_IMAGE: us-central1-docker.pkg.dev/deploy-titan/public/controller
  TARGET_PROJECT: deploytitan-demo
  GCP_REGION: us-central1

jobs:
  deploy:
    name: Deploy Published Controller
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy controller to Cloud Run
        run: |
          IMAGE="${{ env.CONTROLLER_IMAGE }}:${{ github.event.inputs.image_tag}}"
          gcloud run deploy "traffic-controller" \
            --image "$IMAGE" \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.TARGET_PROJECT }} \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 2 \
            --cpu 1 \
            --memory 128Mi \
            --concurrency 80 \
            --set-env-vars "DEPLOYTITAN_API_URL=${{ secrets.DEPLOYTITAN_API_URL }},DEPLOYTITAN_API_KEY=${{ secrets.DEPLOYTITAN_API_KEY }},SERVICE_NAME=core-service,ENVIRONMENT=production" \
            --quiet

      - name: Verify controller health
        run: |
          URL=$(gcloud run services describe "traffic-controller" \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.TARGET_PROJECT }} \
            --format='value(status.url)')
          echo "Controller URL: $URL"
          curl -sf "$URL/health"
